<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Búsqueda Avanzada - Wiki</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- La librería jspdf ha sido eliminada -->
    <script src="https://cdn.jsdelivr.net/npm/showdown/dist/showdown.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Búsqueda Avanzada</h1>
        </header>

        <main>
            <div class="search-form">
                <div class="form-group">
                    <label for="search-id">Coincide con el ID:</label>
                    <input type="text" id="search-id" placeholder="Ej: 20250828204501">
                </div>
                <div class="form-group">
                    <label for="include-text">Contiene el texto:</label>
                    <input type="text" id="include-text" placeholder="Ej: extensión">
                </div>
                <div class="form-group">
                    <label for="exclude-text">NO contiene el texto:</label>
                    <input type="text" id="exclude-text" placeholder="Ej: sentencia">
                </div>
                <div class="form-group">
                    <label for="include-tags">Contiene las etiquetas (separadas por espacio):</label>
                    <div class="autocomplete-container">
                        <input type="text" id="include-tags" placeholder="Ej: principio_de_legalidad ejecutividad" autocomplete="off">
                        <div id="include-tags-suggestions" class="autocomplete-items"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="exclude-tags">NO contiene las etiquetas (separadas por espacio):</label>
                    <div class="autocomplete-container">
                        <input type="text" id="exclude-tags" placeholder="Ej: reglamento tráfico" autocomplete="off">
                        <div id="exclude-tags-suggestions" class="autocomplete-items"></div>
                    </div>
                </div>
                <div class="actions">
                    <button id="perform-search-btn" class="btn">Buscar</button>
                    <button id="recover-search-btn" class="btn">Recuperar última búsqueda</button>
                    <!-- El botón de imprimir ha sido eliminado -->
                    <a href="wiki.html" class="btn">Volver a la Wiki</a>
                </div>
            </div>
            
            <div id="search-results-info"></div>
            <div id="search-results"></div>
        </main>
    </div>
    
    <div id="pinned-sidebar" class="hidden">
        <div class="pinned-sidebar-header">
            <h3>Páginas Guardadas</h3>
            <button id="clear-pins-btn" class="btn-small">Limpiar</button>
        </div>
        <div id="pinned-items-container"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
